{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --navy: #0F2C59;
        --navy-light: #1a4084;
        --gold: #D4AF37;
        --gold-light: #e6c558;
        --light-gray: #F5F5F5;
        --text-light: #666;
        --burgundy: #8A1538;
        --white: #ffffff;
        --shadow-light: rgba(15, 44, 89, 0.08);
        --shadow-medium: rgba(15, 44, 89, 0.15);
        --gradient-primary: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #2a5caa 100%);
        --border-radius: 12px;
        --border-radius-lg: 16px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .forgot-container {
        max-width: 500px;
        margin: 3rem auto;
        padding: 0 2rem;
    }

    .forgot-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .forgot-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: var(--gradient-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        font-size: 2.5rem;
        box-shadow: 0 6px 25px var(--shadow-medium);
    }

    .forgot-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        color: var(--navy);
        margin-bottom: 0.5rem;
    }

    .forgot-header p {
        color: var(--text-light);
        font-size: 0.95rem;
        line-height: 1.5;
    }

    .forgot-card {
        background: var(--white);
        border-radius: var(--border-radius-lg);
        padding: 2.5rem;
        box-shadow: 0 4px 20px var(--shadow-light);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--navy);
        font-size: 0.95rem;
    }

    .input-wrapper {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
        font-size: 1.1rem;
    }

    .form-control {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        border: 2px solid #e0e0e0;
        border-radius: var(--border-radius);
        font-family: 'Lato', sans-serif;
        font-size: 1rem;
        transition: var(--transition);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--navy);
        box-shadow: 0 0 0 3px rgba(15, 44, 89, 0.1);
    }

    .input-hint {
        font-size: 0.85rem;
        color: var(--text-light);
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .input-hint i {
        font-size: 0.75rem;
    }

    .btn-submit {
        width: 100%;
        background: var(--gradient-primary);
        color: var(--white);
        border: none;
        padding: 1rem 1.5rem;
        border-radius: var(--border-radius);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 2rem;
    }

    .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px var(--shadow-medium);
    }

    .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--navy);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
    }

    .back-link:hover {
        color: var(--navy-light);
    }

    .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        border-radius: var(--border-radius);
        color: var(--white);
        z-index: 2000;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 300px;
    }

    .notification.success {
        background: #28a745;
    }

    .notification.error {
        background: var(--burgundy);
    }

    @media (max-width: 768px) {
        .forgot-container {
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .forgot-card {
            padding: 1.5rem;
        }

        .forgot-header h1 {
            font-size: 1.5rem;
        }
    }
</style>

<div class="forgot-container">
    <div class="forgot-header">
        <div class="forgot-icon">
            <i class="fas fa-key"></i>
        </div>
        <h1>Mot de passe oublié ?</h1>
        <p>Entrez votre adresse email et nous vous enverrons<br>un code pour réinitialiser votre mot de passe</p>
    </div>

    <div class="forgot-card">
        <form method="POST" id="forgotForm">
            {% csrf_token %}
            
            <input type="hidden" name="recovery_method" value="email">
            
            <div class="form-group">
                <label for="identifier">Adresse email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="identifier" 
                        name="identifier" 
                        placeholder="exemple@email.com"
                        required
                    >
                </div>
                <div class="input-hint">
                    <i class="fas fa-info-circle"></i>
                    <span>Entrez l'adresse email associée à votre compte</span>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i>
                <span>Envoyer le code de réinitialisation</span>
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Retour à la connexion
        </a>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const submitButton = this.querySelector('button[type="submit"]');
        const originalHTML = submitButton.innerHTML;

        try {
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
            submitButton.disabled = true;

            const response = await fetch('{% url "forgot_password" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const data = await response.json();

            if (data.success) {
                showNotification(data.message, 'success');
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1500);
            } else {
                showNotification(data.message, 'error');
            }
        } catch (error) {
            showNotification('Une erreur s\'est produite. Veuillez réessayer.', 'error');
        } finally {
            submitButton.innerHTML = originalHTML;
            submitButton.disabled = false;
        }
    });

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
            <span>${message}</span>
        `;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.opacity = '0';
            notification.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 300);
        }, 3000);
    }
</script>
{% endblock %}
