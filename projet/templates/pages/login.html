<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mocars</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0F2C59;
            --gold: #D4AF37;
            --light-gray: #F5F5F5;
            --text-dark: #333;
            --burgundy: #8A1538;
            --white: #ffffff;
            --gray-medium: #666666;
            --gray-light: #e1e1e1;
            --navy-light: #1a4084;
            --gold-dark: #b8941f;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.1) 0%, transparent 50%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Header minimal */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 1;
        }

        .logo i {
            color: var(--gold);
        }

        /* Main Container */
        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            margin: 2rem;
            overflow: hidden;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--white);
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .login-header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--gold);
            border-radius: 2px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Form Styles */
        .login-form {
            padding: 3rem 2rem;
        }

        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .input-container {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3rem;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(15, 44, 89, 0.1);
            transform: translateY(-1px);
        }

        .form-input:valid {
            border-color: var(--gold);
        }

        .input-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-medium);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon {
            color: var(--navy);
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--navy);
        }

        .forgot-link {
            color: var(--burgundy);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--navy);
            text-decoration: underline;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--white);
            margin-bottom: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(15, 44, 89, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Loading state */
        .btn-primary.loading {
            pointer-events: none;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid transparent;
            border-top: 2px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--gray-medium);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-light);
        }

        .divider span {
            margin: 0 1rem;
            background: var(--white);
            padding: 0 0.5rem;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-social {
            flex: 1;
            padding: 1rem;
            border: 2px solid var(--gray-light);
            background: var(--white);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            border-color: #db4437;
            color: #db4437;
            transform: translateY(-2px);
        }

        .btn-facebook:hover {
            border-color: #4267B2;
            color: #4267B2;
            transform: translateY(-2px);
        }

        /* Sign Up Link */
        .signup-link {
            text-align: center;
            padding: 2rem;
            background: var(--light-gray);
            color: var(--text-dark);
        }

        .signup-link a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--burgundy);
        }

        /* Error Messages */
        .error-message {
            background: rgba(138, 21, 56, 0.1);
            color: var(--burgundy);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--burgundy);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Messages */
        .success-message {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-dark);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--gold);
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .login-container {
                margin: 1rem;
                border-radius: 15px;
            }

            .login-header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .login-title {
                font-size: 1.8rem;
            }

            .login-form {
                padding: 2rem 1.5rem;
            }

            .form-options {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .social-login {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 0.5rem;
            }

            .login-header {
                padding: 1.5rem 1rem;
            }

            .login-form {
                padding: 1.5rem 1rem;
            }
        }

        /* Accessibility */
        .form-input:focus-visible {
            outline: 2px solid var(--navy);
            outline-offset: 2px;
        }

        .btn:focus-visible {
            outline: 2px solid var(--white);
            outline-offset: 2px;
        }

        /* Password Strength Indicator */
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            display: none;
        }

        .strength-bar {
            height: 3px;
            background: var(--gray-light);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak .strength-fill { 
            width: 33%; 
            background: var(--burgundy); 
        }

        .strength-medium .strength-fill { 
            width: 66%; 
            background: var(--gold); 
        }

        .strength-strong .strength-fill { 
            width: 100%; 
            background: #4CAF50; 
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">
            <i ></i>
           MoCars
        </a>
    </div>

    <!-- Main Login Container -->
    <div class="login-container">
        <!-- Header Section -->
        <div class="login-header">
            <h1 class="login-title">Bienvenue</h1>
            <p class="login-subtitle">Connectez-vous à votre compte  MoCars</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm" action="{% url 'login' %}" method="POST" >
            {% csrf_token %}
            <!-- Error Message -->
            <!-- Error Message -->
<div class="error-message {% if error %}show{% endif %}" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i>
    <span id="errorText">{% if error %}{{ error }}{% endif %}</span>
</div>


            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Connexion réussie ! Redirection en cours...</span>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <div class="input-container">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        required 
                        autocomplete="email"
                        placeholder="votre.email@exemple.com"
                    >
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        required 
                        autocomplete="current-password"
                        placeholder="Votre mot de passe"
                    >
                    <i class="fas fa-lock input-icon" id="passwordIcon"></i>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>
            </div>

           

            <!-- Login Button -->
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span id="loginBtnText">Se connecter</span>
            </button>

           
        </form>

        <!-- Sign Up Link -->
        <div class="signup-link">
            <p>Vous n'avez pas encore de compte ? <a href="/register">Créer un compte</a></p>
        </div>
    </div>

    <script>
        // Form elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const passwordIcon = document.getElementById('passwordIcon');

        // Toggle password visibility
        passwordIcon.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                this.classList.remove('fa-lock');
                this.classList.add('fa-eye-slash');
            } else {
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-lock');
            }
        });

        // Form validation
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePassword(password) {
            return password.length >= 6;
        }

        function showError(message) {
            errorMessage.querySelector('#errorText').textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
            
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.querySelector('#successText').textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                loginBtnText.style.opacity = '0';
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                loginBtnText.style.opacity = '1';
            }
        }

        // Form submission
        

        // Social login handlers
        document.querySelector('.btn-google').addEventListener('click', function() {
            alert('Connexion Google - Fonctionnalité à implémenter');
        });

        document.querySelector('.btn-facebook').addEventListener('click', function() {
            alert('Connexion Facebook - Fonctionnalité à implémenter');
        });

        // Forgot password handler
        document.querySelector('.forgot-link').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Redirection vers la page de récupération de mot de passe');
        });

        // Input animations
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('focused');
            });
        });

        // Auto-hide messages when user starts typing
        emailInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });

        passwordInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });

        // Remember me functionality
        const rememberCheckbox = document.getElementById('remember');
        
        // Load saved credentials
        window.addEventListener('load', function() {
            const savedEmail = localStorage.getItem('rememberedEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberCheckbox.checked = true;
            }
        });

        // Save credentials when form is submitted successfully
        loginForm.addEventListener('submit', function() {
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberedEmail', emailInput.value);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // Initialize
        console.log('Elite Auto - Page de connexion initialisée');
        
        // Demo credentials hint
        console.log('💡 Identifiants de démonstration:');
        console.log('Email: demo@elite-auto.fr');
        console.log('Password: demo123');
    </script>
</body>
</html>
