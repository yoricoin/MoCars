{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --navy: #0F2C59;
        --navy-light: #1a4084;
        --gold: #D4AF37;
        --text-light: #666;
        --burgundy: #8A1538;
        --white: #ffffff;
        --shadow-light: rgba(15, 44, 89, 0.08);
        --shadow-medium: rgba(15, 44, 89, 0.15);
        --gradient-primary: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #2a5caa 100%);
        --border-radius: 12px;
        --border-radius-lg: 16px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .verify-container {
        max-width: 500px;
        margin: 3rem auto;
        padding: 0 2rem;
    }

    .verify-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .verify-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: var(--gradient-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        font-size: 2.5rem;
        box-shadow: 0 6px 25px var(--shadow-medium);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .verify-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        color: var(--navy);
        margin-bottom: 0.5rem;
    }

    .verify-header p {
        color: var(--text-light);
        font-size: 0.95rem;
    }

    .verify-card {
        background: var(--white);
        border-radius: var(--border-radius-lg);
        padding: 2.5rem;
        box-shadow: 0 4px 20px var(--shadow-light);
    }

    .code-input-container {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        margin: 2rem 0;
    }

    .code-digit {
        width: 60px;
        height: 70px;
        font-size: 2rem;
        text-align: center;
        border: 2px solid #e0e0e0;
        border-radius: var(--border-radius);
        font-weight: 700;
        color: var(--navy);
        transition: var(--transition);
        font-family: 'Courier New', monospace;
    }

    .code-digit:focus {
        outline: none;
        border-color: var(--navy);
        box-shadow: 0 0 0 3px rgba(15, 44, 89, 0.1);
    }

    .code-digit.filled {
        background: rgba(15, 44, 89, 0.05);
        border-color: var(--navy);
    }

    .timer-container {
        text-align: center;
        margin: 1.5rem 0;
        padding: 1rem;
        background: rgba(15, 44, 89, 0.05);
        border-radius: var(--border-radius);
    }

    .timer {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--navy);
        font-family: 'Courier New', monospace;
    }

    .timer.warning { color: #ffa500; }
    .timer.danger {
        color: var(--burgundy);
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0.5; }
    }

    .timer-label {
        font-size: 0.9rem;
        color: var(--text-light);
        margin-top: 0.5rem;
    }

    .btn-submit {
        width: 100%;
        background: var(--gradient-primary);
        color: var(--white);
        border: none;
        padding: 1rem 1.5rem;
        border-radius: var(--border-radius);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
    }

    .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px var(--shadow-medium);
    }

    .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .resend-container {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
    }

    .resend-text {
        color: var(--text-light);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
    }

    .btn-resend {
        background: transparent;
        color: var(--navy);
        border: none;
        font-weight: 600;
        cursor: pointer;
        text-decoration: underline;
        transition: var(--transition);
        padding: 0.5rem;
    }

    .btn-resend:hover:not(:disabled) {
        color: var(--navy-light);
    }

    .btn-resend:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        text-decoration: none;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 1rem;
        color: var(--navy);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
        font-size: 0.9rem;
    }

    .back-link:hover {
        color: var(--navy-light);
    }

    .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        border-radius: var(--border-radius);
        color: var(--white);
        z-index: 2000;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 300px;
    }

    .notification.success { background: #28a745; }
    .notification.error { background: var(--burgundy); }

    @media (max-width: 768px) {
        .verify-container {
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .verify-card { padding: 1.5rem; }
        .code-digit {
            width: 50px;
            height: 60px;
            font-size: 1.5rem;
        }
        .code-input-container { gap: 0.5rem; }
    }
</style>

<div class="verify-container">
    <div class="verify-header">
        <div class="verify-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Code de vérification</h1>
        <p>Entrez le code à 6 chiffres envoyé par email</p>
    </div>

    <div class="verify-card">
        <form method="POST" id="verifyForm">
            {% csrf_token %}
            
            <div class="code-input-container">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="0" autocomplete="off">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="1" autocomplete="off">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="2" autocomplete="off">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="3" autocomplete="off">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="4" autocomplete="off">
                <input type="text" class="code-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" data-index="5" autocomplete="off">
            </div>

            <input type="hidden" name="code" id="fullCode">

            <div class="timer-container">
                <div class="timer" id="timer">10:00</div>
                <div class="timer-label">Temps restant</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>
                <i class="fas fa-check-circle"></i>
                <span>Vérifier le code</span>
            </button>
        </form>

        <div class="resend-container">
            <p class="resend-text">Vous n'avez pas reçu le code ?</p>
            <button type="button" class="btn-resend" id="resendBtn">
                <i class="fas fa-redo"></i> Renvoyer le code
            </button>
        </div>

        <a href="{% url 'forgot_password' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>
</div>

<script>
    const codeDigits = document.querySelectorAll('.code-digit');
    const fullCodeInput = document.getElementById('fullCode');
    const submitBtn = document.getElementById('submitBtn');
    const timerDisplay = document.getElementById('timer');
    const resendBtn = document.getElementById('resendBtn');
    
    let timeLeft = 600; // 10 minutes

    codeDigits[0].focus();

    // Gestion de la saisie
    codeDigits.forEach((input, index) => {
        input.addEventListener('input', function(e) {
            const value = this.value;
            
            if (!/^\d$/.test(value)) {
                this.value = '';
                return;
            }

            this.classList.add('filled');

            if (value && index < codeDigits.length - 1) {
                codeDigits[index + 1].focus();
            }

            updateFullCode();
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !this.value && index > 0) {
                codeDigits[index - 1].focus();
                codeDigits[index - 1].value = '';
                codeDigits[index - 1].classList.remove('filled');
                updateFullCode();
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').replace(/\D/g, '');
            
            if (pastedData.length === 6) {
                pastedData.split('').forEach((digit, i) => {
                    if (codeDigits[i]) {
                        codeDigits[i].value = digit;
                        codeDigits[i].classList.add('filled');
                    }
                });
                codeDigits[5].focus();
                updateFullCode();
            }
        });
    });

    function updateFullCode() {
        const code = Array.from(codeDigits).map(input => input.value).join('');
        fullCodeInput.value = code;
        submitBtn.disabled = code.length !== 6;
    }

    // Timer
    function updateTimer() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

        if (timeLeft <= 60) {
            timerDisplay.classList.add('danger');
        } else if (timeLeft <= 180) {
            timerDisplay.classList.add('warning');
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            showNotification('Le code a expiré. Veuillez demander un nouveau code.', 'error');
            submitBtn.disabled = true;
            codeDigits.forEach(input => input.disabled = true);
        } else {
            timeLeft--;
        }
    }

    const timerInterval = setInterval(updateTimer, 1000);
    updateTimer();

    // Soumission du formulaire
    document.getElementById('verifyForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const originalHTML = submitBtn.innerHTML;

        try {
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';
            submitBtn.disabled = true;

            const response = await fetch('{% url "verify_code" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const data = await response.json();

            if (data.success) {
                showNotification(data.message || 'Code vérifié avec succès !', 'success');
                clearInterval(timerInterval);
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1000);
            } else {
                showNotification(data.message, 'error');
                codeDigits.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                codeDigits[0].focus();
                submitBtn.disabled = true;
            }
        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Une erreur s\'est produite. Veuillez réessayer.', 'error');
        } finally {
            submitBtn.innerHTML = originalHTML;
        }
    });

    // Renvoyer le code
    resendBtn.addEventListener('click', async function() {
        const originalHTML = this.innerHTML;
        
        try {
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
            this.disabled = true;

            // Redirige vers forgot_password pour renvoyer un nouveau code
            window.location.href = '{% url "forgot_password" %}';

        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Une erreur s\'est produite.', 'error');
            this.innerHTML = originalHTML;
            this.disabled = false;
        }
    });

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
            <span>${message}</span>
        `;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.opacity = '0';
            notification.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 300);
        }, 3000);
    }
</script>
{% endblock %}
